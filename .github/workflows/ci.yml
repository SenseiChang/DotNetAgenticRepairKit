name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Display .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore DotNetAgenticRepairKit.sln

      - name: Build
        run: dotnet build DotNetAgenticRepairKit.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DotNetAgenticRepairKit.sln --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
